trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:

- stage: Build
  jobs:
  - job: BuildDocker
    steps:

    - script: |
        docker build -t myapp:v1 .
      displayName: Build Docker Image

- stage: Test
  dependsOn: Build
  jobs:
  - job: TestApp
    steps:

    - script: |
        docker run -d -p 5000:5000 --name mycontainer myapp:v1

        sleep 5

        curl -f http://localhost:5000/health
      displayName: Test Health Endpoint